<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
    <style>
      .box { fill: #fff; stroke: #333; stroke-width: 1.5; rx: 8; }
      .title { font-size: 16px; font-weight: bold; fill: #222; }
      .label { font-size: 12px; fill: #333; }
      .small { font-size: 10px; fill: #666; }
      .green { fill: #e6f9e6; stroke: #2e8b2e; }
      .yellow { fill: #fff8e1; stroke: #d4a017; }
      .gray { fill: #f0f0f0; stroke: #888; }
      .core { fill: #e3f2fd; stroke: #1565c0; stroke-width: 2; }
    </style>
  </defs>

  <!-- Título -->
  <text x="450" y="28" text-anchor="middle" class="title">cerebropax — Banco de cerebros de open-pax</text>
  <text x="450" y="48" text-anchor="middle" class="small">Una sola puerta (LiteLLM en Frankfurt) → reparte a todos los modelos. Solo por Tailscale.</text>

  <!-- Consumidores (izquierda) -->
  <text x="60" y="90" class="title">Consumidores</text>
  <rect x="40" y="100" width="150" height="40" class="box green"/>
  <text x="115" y="125" text-anchor="middle" class="label">🧠 Letta (SP:8283)</text>
  <rect x="40" y="150" width="150" height="40" class="box green"/>
  <text x="115" y="175" text-anchor="middle" class="label">🏭 La Fábrica (laptop)</text>
  <rect x="40" y="200" width="150" height="40" class="box green"/>
  <text x="115" y="225" text-anchor="middle" class="label">🛎️ Constelación (WA)</text>
  <rect x="40" y="250" width="150" height="40" class="box gray"/>
  <text x="115" y="275" text-anchor="middle" class="label">📜 scripts / Erik</text>

  <!-- Flechas hacia el gateway -->
  <line x1="190" y1="120" x2="370" y2="200" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="190" y1="170" x2="370" y2="210" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="190" y1="220" x2="370" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="190" y1="270" x2="370" y2="230" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Gateway central -->
  <rect x="370" y="170" width="200" height="100" class="box core"/>
  <text x="470" y="200" text-anchor="middle" class="title">🧠 LiteLLM Gateway</text>
  <text x="470" y="220" text-anchor="middle" class="label">http://workspace:4000</text>
  <text x="470" y="238" text-anchor="middle" class="small">Oracle Frankfurt · 24/7</text>
  <text x="470" y="255" text-anchor="middle" class="small">1 llave maestra · failover auto</text>

  <!-- Flechas hacia los proveedores -->
  <line x1="570" y1="190" x2="700" y2="80" stroke="#2e8b2e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="200" x2="700" y2="120" stroke="#2e8b2e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="210" x2="700" y2="160" stroke="#2e8b2e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="220" x2="700" y2="200" stroke="#d4a017" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="230" x2="700" y2="240" stroke="#2e8b2e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="240" x2="700" y2="280" stroke="#2e8b2e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="250" x2="700" y2="320" stroke="#2e8b2e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="260" x2="700" y2="400" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Proveedores (derecha) -->
  <text x="820" y="70" text-anchor="middle" class="title">Banco de cerebros</text>

  <rect x="700" y="60" width="170" height="36" class="box green"/>
  <text x="785" y="83" text-anchor="middle" class="label">⚡ Groq · $0 · rápido</text>

  <rect x="700" y="102" width="170" height="36" class="box green"/>
  <text x="785" y="125" text-anchor="middle" class="label">🧠 NVIDIA NIM · 120 modelos</text>

  <rect x="700" y="144" width="170" height="36" class="box green"/>
  <text x="785" y="167" text-anchor="middle" class="label">👁️ Gemini · multimodal</text>

  <rect x="700" y="182" width="170" height="36" class="box yellow"/>
  <text x="785" y="205" text-anchor="middle" class="label">💻 DeepSeek · centavos</text>

  <rect x="700" y="224" width="170" height="36" class="box green"/>
  <text x="785" y="247" text-anchor="middle" class="label">⚡ Cerebras · $0</text>

  <rect x="700" y="266" width="170" height="36" class="box green"/>
  <text x="785" y="289" text-anchor="middle" class="label">📦 Mistral / Cohere / HF</text>

  <rect x="700" y="308" width="170" height="36" class="box green"/>
  <text x="785" y="331" text-anchor="middle" class="label">🎛️ OpenRouter · 100+</text>

  <rect x="700" y="386" width="170" height="36" class="box gray"/>
  <text x="785" y="409" text-anchor="middle" class="label">🏠 Ollama SP/laptop · local</text>

  <!-- Leyenda -->
  <rect x="40" y="440" width="820" height="120" class="box" stroke="#ccc"/>
  <text x="60" y="465" class="title">Leyenda</text>
  <rect x="60" y="475" width="20" height="14" class="green"/>
  <text x="90" y="487" class="label">🟢 Gratis ($0)</text>
  <rect x="200" y="475" width="20" height="14" class="yellow"/>
  <text x="230" y="487" class="label">🟡 Pago barato (centavos)</text>
  <rect x="400" y="475" width="20" height="14" class="gray"/>
  <text x="430" y="487" class="label">⚪ Local / respaldo</text>
  <rect x="560" y="475" width="20" height="14" class="core"/>
  <text x="590" y="487" class="label">🔵 Gateway (el conmutador)</text>

  <text x="60" y="515" class="small">Flujo: consumidor → POST http://workspace:4000/v1/chat/completions (con llave maestra) → LiteLLM enruta al proveedor correcto.</text>
  <text x="60" y="535" class="small">Failover: si Groq cae → Cerebras → Ollama local. El consumidor no se entera.</text>
  <text x="60" y="555" class="small">Seguridad: todo por Tailscale (red privada). El puerto 4000 no está abierto al internet público.</text>
</svg>